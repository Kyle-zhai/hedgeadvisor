# Closed-loop scheduler WITHOUT Vercel: GitHub Actions is both the scheduler and the compute.
# Each run checks out the repo, builds + starts the Next app inside the runner, and curls the three
# cron routes with the Bearer header. The only external dependency is a persistent Postgres
# (DATABASE_URL) — a free Neon/Supabase instance is enough. Nothing is deployed anywhere.
#
# Required repo config (Settings -> Secrets and variables -> Actions):
#   Secrets:  DATABASE_URL, CRON_SECRET, DASHSCOPE_API_KEY (or QWEN_API_KEY), AI_GATEWAY_API_KEY (optional)
#   Variables: HEDGE_RELATION_SNAPSHOT_JOBS_JSON  (required, else /relations freezes nothing)
#              plus any HEDGE_*/QWEN_* config you keep in .env.local (all optional, sane defaults exist)
#
# NOTE: GitHub may delay scheduled runs under load, and it auto-DISABLES schedules after 60 days with
# no repo commits — push occasionally (or run "Run workflow" manually) to keep it alive.
name: hedge-closed-loop

on:
  schedule:
    # Hourly. NOTE: more frequent does NOT speed accrual — backtest rows appear only when frozen pairs'
    # markets SETTLE (real-world calendar). Hourly mainly keeps capture fresh + finer price snapshots.
    # GitHub's floor is every 5 min, but build caching below keeps each run ~1-2 min so hourly fits the
    # private-repo 2000 min/mo budget (~720 runs). Dial down (e.g. "0 */6 * * *") to save minutes.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      run_historical_backfill:
        description: "Run configured historical backfill once"
        required: false
        type: boolean
        default: false

concurrency:
  group: hedge-closed-loop
  cancel-in-progress: false # never interrupt an in-flight settlement write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # secrets (keys + DB). NOTE: do NOT map secrets you haven't set — GitHub injects them as "" and
      # `process.env.X ?? ...` would keep the empty string instead of falling through. Only map what exists.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      # non-secret config (mirror what you keep in .env.local)
      HEDGE_RELATION_SNAPSHOT_JOBS_JSON: ${{ vars.HEDGE_RELATION_SNAPSHOT_JOBS_JSON }}
      HEDGE_SETTLE_JOBS_JSON: ${{ vars.HEDGE_SETTLE_JOBS_JSON }}
      HEDGE_HISTORICAL_BACKFILL_JOBS_JSON: ${{ vars.HEDGE_HISTORICAL_BACKFILL_JOBS_JSON }}
      QWEN_BASE_URL: ${{ vars.QWEN_BASE_URL }}
      QWEN_RELATION_MODEL: ${{ vars.QWEN_RELATION_MODEL }}
      QWEN_RELATION_MODELS: ${{ vars.QWEN_RELATION_MODELS }}
      QWEN_EMBED_MODEL: ${{ vars.QWEN_EMBED_MODEL }}
      QWEN_RELATION_TIMEOUT_MS: ${{ vars.QWEN_RELATION_TIMEOUT_MS }}
      HEDGE_ENABLE_SEMANTIC_EMBEDDINGS: ${{ vars.HEDGE_ENABLE_SEMANTIC_EMBEDDINGS }}
      PORT: "3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Cache node_modules so most hourly runs skip the ~1-2 min install entirely.
      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'

      # Reuse Next's incremental build cache across runs (build itself is ~5s for this app).
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-cache-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: next-cache-${{ hashFiles('package-lock.json') }}-

      - name: Build (no secrets needed — routes are force-dynamic)
        run: npm run build

      - name: Start server
        run: |
          npm run start > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 60); do
            curl -sf -o /dev/null "http://localhost:3000/discover" && { echo "ready"; break; }
            sleep 2
          done

      - name: Trigger closed-loop crons (relations -> settle -> snapshot)
        run: |
          set -uo pipefail
          fail=0
          for path in relations settle snapshot; do
            echo "::group::/api/cron/$path"
            code=$(curl -s -o /tmp/out.json -w '%{http_code}' --max-time 600 \
              -H "authorization: Bearer ${CRON_SECRET}" \
              "http://localhost:3000/api/cron/${path}")
            cat /tmp/out.json 2>/dev/null; echo
            echo "HTTP ${code}"
            [ "$code" = "200" ] || { echo "::error::/api/cron/${path} returned ${code}"; fail=1; }
            echo "::endgroup::"
          done
          exit $fail

      - name: Historical relation backfill (manual opt-in only)
        if: github.event_name == 'workflow_dispatch' && inputs.run_historical_backfill
        run: |
          code=$(curl -s -o /tmp/historical.json -w '%{http_code}' --max-time 290 \
            -H "authorization: Bearer ${CRON_SECRET}" \
            "http://localhost:3000/api/cron/historical")
          cat /tmp/historical.json 2>/dev/null; echo
          [ "$code" = "200" ] || { echo "::error::historical backfill returned ${code}"; exit 1; }

      - name: Qwen-in-CI probe (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "::group::/api/discover probe — does Qwen classify + emit mechanism graphs on the runner?"
          body=$(curl -s --max-time 150 -X POST "http://localhost:3000/api/discover" \
            -H "content-type: application/json" \
            -d '{"query":"France wins the World Cup","eventSlug":"world-cup-winner","topK":12}')
          echo "response bytes:             $(printf '%s' "$body" | wc -c | tr -d ' ')"
          echo "mechanism-graph signatures: $(printf '%s' "$body" | grep -oE 'mechanismGraph|mechanismType|anchorEventClass|cross_entity|cross_domain' | wc -l | tr -d ' ')"
          echo "llm-method markers:         $(printf '%s' "$body" | grep -oE '"method":"llm"' | wc -l | tr -d ' ')"
          printf '%s' "$body" | grep -oE '"error":"[^"]{0,80}' | head -1 || true
          echo "::endgroup::"

      - name: Primary LLM REALISTIC probe (manual only — mimics the app's exact request)
        if: github.event_name == 'workflow_dispatch'
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_RELATION_MODEL: ${{ vars.QWEN_RELATION_MODEL }}
          QWEN_RELATION_MODELS: ${{ vars.QWEN_RELATION_MODELS }}
          QWEN_BASE_URL: ${{ vars.QWEN_BASE_URL }}
        run: |
          MODEL="${QWEN_RELATION_MODEL:-qwen-plus}"
          BASE="${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
          THINKING=false
          case "$MODEL" in MiniMax-*) THINKING=true ;; esac
          # same shape the app sends; Bailian's MiniMax-M2.5 is thinking-only.
          PAYLOAD='{"model":"'"$MODEL"'","temperature":0,"enable_thinking":'"$THINKING"',"max_tokens":3000,"messages":[{"role":"system","content":"You classify prediction-market relations and return JSON only with keys relation,direction,mechanism,sharedEntities,counterexamples,confidence,requiresCalibration,mechanismGraph."},{"role":"user","content":"ANCHOR: France wins the 2026 World Cup. CANDIDATE: France national-team head coach departs by end of 2026. Classify and return the JSON object."}],"response_format":{"type":"json_object"}}'
          echo "endpoint: ${BASE%/}  model: $MODEL"
          out=$(curl -s -o /tmp/qr.json -w 'HTTP=%{http_code} time=%{time_total}s' --max-time 90 \
            -H "Authorization: Bearer ${QWEN_API_KEY}" -H "content-type: application/json" \
            -d "$PAYLOAD" "${BASE%/}/chat/completions" || echo "HTTP=CURL_FAILED")
          echo "$out"
          echo "response bytes: $(wc -c < /tmp/qr.json 2>/dev/null)"
          echo "mechanismGraph in response: $(grep -c mechanismGraph /tmp/qr.json 2>/dev/null)"
          grep -oE '"(message|code|type)":[ ]?"[^"]{0,180}"' /tmp/qr.json 2>/dev/null | head -3 || echo "(no error fields)"

      - name: Real-code LLM classifier diagnostic (manual only — shows model attempts)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "/api/diag/qwen (runs ordered model fallback incl. Zod validation):"
          curl -s --max-time 180 -H "authorization: Bearer ${CRON_SECRET}" "http://localhost:3000/api/diag/qwen"
          echo

      - name: Server log (qwen/error lines, secret-filtered)
        if: always()
        run: |
          grep -aiE "qwen|minimax|dashscope|mechanism|classif|ECONNREFUSED|ETIMEDOUT|timeout|fetch failed|aborted|unauthorized|status (4|5)[0-9][0-9]" server.log 2>/dev/null \
            | grep -aviE "api[-_]?key|authorization|bearer|password|postgres" | tail -40 || echo "(no qwen/error lines in server.log)"

      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true
