        - generic [ref=e63]: "Not financial advice. The Related-markets table is a DESCRIPTIVE map: φ there is the binary correlation from the joint P(A∩B), exact for structural relations and a Fréchet-clamped estimate otherwise — it is NOT a settlement guarantee, and price co-movement is never used as φ. The Robust hedge is the only ACTIONABLE output: it prices each leg off the real book (cost), caps by depth (capacity), and admits a leg only when deterministic structure proves it covers every anchor-fail state, or settled-outcome calibration proves it pays more often when the anchor fails (uncertainty via credible bounds). LLM (Qwen) relations are hypotheses only — never an exact structural claim — and are rejected until calibrated. Soft legs add to the strict worst loss because they can pay $0 in a possible state."
